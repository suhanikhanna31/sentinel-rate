spring.application.name=sentinel-rate-limiter

# ── Redis Connection ──────────────────────────────────────────────────────────
# Centralized cache used by all rate-limiting and abuse-detection services.
# Override host/port via environment variables in production (REDIS_HOST, REDIS_PORT).
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080

# ── Logging (shows rate-limit decisions) ─────────────────────────────────────
logging.level.com.sentinel=DEBUG