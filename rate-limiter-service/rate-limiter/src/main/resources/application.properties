server.port=${PORT:8080}

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=2000ms

# Default datasource: in-memory H2, wiped on every restart. Fine for local dev and the
# CI/docker-smoke test. For a real deployment (e.g. Render) with a durable audit trail,
# activate the "postgres" profile instead — see application-postgres.properties.
spring.datasource.url=jdbc:h2:mem:sentineldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.metrics.tags.application=sentinel-rate

# Shared-secret key required on every /admin/** request (see AdminAuthFilter).
# Set this as a real value in your deployment environment (e.g. Render env vars).
# If left blank, all /admin/** requests are rejected with 503.
admin.api.key=${ADMIN_API_KEY:}
