# Activated via SPRING_PROFILES_ACTIVE=postgres. Overrides the H2 defaults in
# application.properties with a real Postgres datasource, so the audit trail
# (rate_limit_events / abuse_violations) actually survives restarts and redeploys.
#
# Expects DB_HOST, DB_PORT, DB_NAME, DB_USER, DB_PASSWORD to be set as env vars —
# see render.yaml, which wires these from a Render-managed Postgres instance.
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# The H2 console has no reason to be reachable once a real database is in play.
spring.h2.console.enabled=false
